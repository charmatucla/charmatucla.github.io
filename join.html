      <h2> Below are some ways to get involved! </h2> 
      <h2 id="forev"> For everyone: </h2>
      <div class="checking">
        <label class="container">Educate yourself on OCD! Aside from our <a href="learnmore.html">Learn more</a> page, here are some other amazing resources: <a href="https://iocdf.org">IOCDF</a>, <a href="https://peaceofmind.com">Peace of Mind Foundation</a>, <a href="https://iocdf.org">IOCDF</a>
          <input type="checkbox">
          <span class="checkmark"></span>
        </label>
        <label class="container">Sign petitions related to mental health! You can find some <a href="https://www.change.org/search?q=mental%20health">here.</a>
          <input type="checkbox">
          <span class="checkmark"></span>
        </label>
        <label class="container">If you can, donate to mental health organizations, such as <a href="https://iocdf.org/get-involved/donate/ways-to-give/">International OCD Foundation (IOCDF)</a> or the <a href="https://www.nami.org/About-NAMI/Donate-to-NAMI">National Alliance on Mental Illness (NAMI)</a> To find more mental health organizations to donate to, check out <a href="https://www.verywellmind.com/leading-mental-health-charities-and-organizations-4147842">this great article</a> by Verywell!
          <input type="checkbox">
          <span class="checkmark"></span>
        </label>
        <label class="container"> Spread the word! <a href="mailto:?body=Hey!%20Check%20out%20this%20cool%20website%20to%20learn%20more%20about%20OCD:%20https://ocd-awareness.leicamp.repl.co/%20">Click here</a> to email this link to a friend!
          <input type="checkbox">
          <span class="checkmark"></span>
        </label>

        </label>

      <div class="checking">

          <input type="checkbox">
